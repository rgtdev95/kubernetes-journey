- name: Stage 6 - Install ArgoCD on Central Hub
  hosts: central-hub-cp
  become: yes
  tasks:
    - name: Create argocd namespace
      command: kubectl create namespace argocd
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: ns_result
      failed_when: ns_result.rc != 0 and 'AlreadyExists' not in ns_result.stderr
      changed_when: "'created' in ns_result.stdout"

    - name: Try installing exactly ArgoCD v3.3.6 via manifest
      command: kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.6/manifests/install.yaml --server-side --force-conflicts
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    - name: Wait for argocd-server deployment to be available
      command: kubectl rollout status deployment/argocd-server -n argocd --timeout=300s
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    - name: Setup ArgoCD Ingress configuration
      copy:
        dest: /tmp/argocd-ingress.yaml
        content: |
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: argocd-server-ingress
            namespace: argocd
            annotations:
              cert-manager.io/cluster-issuer: selfsigned-issuer
              nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
              nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
          spec:
            ingressClassName: nginx
            tls:
              - hosts:
                  - argocd.local
                secretName: argocd-tls-certificate
            rules:
              - host: argocd.local
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: argocd-server
                          port:
                            number: 443
    
    - name: Apply ArgoCD Ingress
      command: kubectl apply -f /tmp/argocd-ingress.yaml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    - name: Retrieve Auto-Generated Admin Password
      command: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}"
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: argocd_password
      changed_when: false

    - name: Print ArgoCD Admin Password
      debug:
        msg: 
          - "=========================================================="
          - "ArgoCD URL: https://argocd.local"
          - "Username: admin"
          - "Password: {{ argocd_password.stdout | b64decode }}"
          - "=========================================================="
