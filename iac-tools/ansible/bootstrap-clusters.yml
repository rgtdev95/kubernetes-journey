- name: Initialize Control Planes
  hosts: control_planes
  become: yes
  tasks:
    - name: Initialize Kubernetes cluster
      command: kubeadm init --pod-network-cidr=10.244.0.0/16 --apiserver-advertise-address={{ ansible_host }}
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Create .kube directory for user k8sadmin
      file:
        path: /home/{{ ansible_user }}/.kube
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Copy admin.conf to user's kube config
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/{{ ansible_user }}/.kube/config
        remote_src: yes
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'

    - name: Generate join command
      command: kubeadm token create --print-join-command
      register: kubeadm_join_cmd
      changed_when: false

    - name: Store join command as a fact
      set_fact:
        join_command: "{{ kubeadm_join_cmd.stdout }}"
      
    - name: Download Calico Tigera Operator
      get_url:
        url: https://raw.githubusercontent.com/projectcalico/calico/v3.27.0/manifests/tigera-operator.yaml
        dest: /tmp/tigera-operator.yaml

    - name: Apply Calico Operator
      command: kubectl apply -f /tmp/tigera-operator.yaml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    - name: Download Calico Custom Resources
      get_url:
        url: https://raw.githubusercontent.com/projectcalico/calico/v3.27.0/manifests/custom-resources.yaml
        dest: /tmp/calico-custom-resources.yaml

    - name: Set Calico Pod CIDR to match our 10.244.0.0/16 architecture
      replace:
        path: /tmp/calico-custom-resources.yaml
        regexp: 'cidr: 192\.168\.0\.0/16'
        replace: 'cidr: 10.244.0.0/16'

    - name: Apply Calico Custom Resources
      command: kubectl apply -f /tmp/calico-custom-resources.yaml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

- name: Join Central-Hub Worker
  hosts: central-hub-worker
  become: yes
  tasks:
    - name: Execute join command
      command: "{{ hostvars['central-hub-cp']['join_command'] }}"
      args:
        creates: /etc/kubernetes/kubelet.conf

- name: Join Prod-Cluster Worker
  hosts: prod-cluster-worker
  become: yes
  tasks:
    - name: Execute join command
      command: "{{ hostvars['prod-cluster-cp']['join_command'] }}"
      args:
        creates: /etc/kubernetes/kubelet.conf

- name: Join Dev-Cluster Worker
  hosts: dev-cluster-worker
  become: yes
  tasks:
    - name: Execute join command
      command: "{{ hostvars['dev-cluster-cp']['join_command'] }}"
      args:
        creates: /etc/kubernetes/kubelet.conf
